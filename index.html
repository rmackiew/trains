<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wagony i rozjazd — v17 logged</title>
  <style>
    /* ── Design tokens ───────────────────────────────────── */
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --ink:#111827;
      --muted:#6b7280;

      --track:#9aa3b2;
      --trackHi:#64748b;
      --ballast:#eef2f7;

      --pad:16px;

      --yMain: 140px;
      --ySiding: 325px;
      --switchX: 50%;

      --trackThickness: 10px;

      --carW: auto;
      --carH: 30px;
      --gap: 10px;

      --animSpeed: 1.28;
      --animMinDur: 260;
      --animMaxDur: 860;
      --pushDelay: 140;
      --releaseDelay: 180;
      --gapCloseDelay: 140;
    }

    body{ margin:0; font-family: system-ui, "Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--ink); }
    .wrap{ max-width:100%; margin:0; padding:18px; }
    h1{ font-size:18px; margin:0 0 10px; }

    .panel{
      background:var(--panel);
      border-radius:16px;
      padding:var(--pad);
      box-shadow:0 10px 28px rgba(0,0,0,.09);
    }

    .yard{
      position:relative;
      height:420px;
      border-radius:14px;
      background: linear-gradient(180deg, #fbfcff 0%, #f4f7ff 100%);
      overflow:hidden;
      border: 1px solid #e6e9f3;
    }

    .ballast{
      position:absolute;
      height:70px;
      border-radius:18px;
      background: var(--ballast);
      border: 1px solid #e5e7ef;
      opacity:.95;
    }
    .ballast.main{ left:18px; right:18px; top: calc(var(--yMain) - 35px); }
    .ballast.siding{ left: var(--switchX); right: 18px; top: calc(var(--ySiding) - 35px); }

    .rail{
      position:absolute;
      height: var(--trackThickness);
      background: var(--track);
      border-radius:999px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
      transition: filter 180ms ease, background 180ms ease;
    }
    .rail.main{ left: 18px; right: 18px; top: calc(var(--yMain) - var(--trackThickness)/2); }
    .rail.hi{
      background: var(--trackHi);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.14));
    }

    .ties{
      position:absolute;
      height: 36px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 10px,
          rgba(203,213,225,.65) 10px 14px
        );
      opacity:.7;
      pointer-events:none;
      mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);
    }
    .ties.main{ left:18px; right:18px; top: calc(var(--yMain) - 18px); }
    .ties.siding{ left: var(--switchX); right: 18px; top: calc(var(--ySiding) - 18px); }

    .connector{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .connector path{
      transition: filter 180ms ease, stroke 180ms ease;
    }
    .connector path.hi{
      stroke: var(--trackHi);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.14));
    }

    .switchTip{
      position:absolute;
      left: calc(var(--switchX) - 11px);
      top: calc(var(--yMain) - 11px);
      width: 22px; height: 22px;
      background:#e5e7eb;
      border:1px solid #cbd5e1;
      border-radius: 8px;
      transform: rotate(10deg);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .switchTip.pulse{
      transform: rotate(10deg) scale(1.08);
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
    }

    .label{
      position:absolute;
      font-size: 12px;
      color: var(--muted);
      font-weight: 650;
      background: rgba(255,255,255,.75);
      border: 1px solid #e5e7ef;
      padding: 6px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    .label.left  { left: 18px;          top: calc(var(--yMain)   - 70px); }
    .label.right { left: var(--switchX); top: calc(var(--yMain)   - 70px); }
    .label.siding{ left: var(--switchX); top: calc(var(--ySiding) - 70px); }

    .carsRow{
      position:absolute;
      display:flex;
      align-items:center;
      gap: var(--gap);
      height: 44px;
      padding: 0 6px;
      overflow:hidden;
      transform: translateX(0);
      transition: transform 220ms cubic-bezier(.2,.85,.2,1);
      will-change: transform;
    }
    .carsLeft{
      left: 18px;
      top: calc(var(--yMain) - 22px);
      width: calc(var(--switchX) - 18px);
      justify-content:flex-end;
    }
    .carsRight{
      left: var(--switchX);
      right: 18px;
      top: calc(var(--yMain) - 22px);
      justify-content:flex-start;
    }
    .carsSiding{
      left: var(--switchX);
      right: 18px;
      top: calc(var(--ySiding) - 22px);
      justify-content:flex-start;
    }

    .car{
      min-width: 34px;
      max-width: 68px;
      width: auto;
      padding: 0 8px;
      height: var(--carH);
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select:none;
      border: 1px solid rgba(17,24,39,.14);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      position: relative;
      flex: 0 0 auto;
    }
    .car::before, .car::after{
      content:"";
      position:absolute;
      bottom: -6px;
      width: 10px; height: 10px;
      background:#111827;
      opacity:.25;
      border-radius:50%;
      border: 1px solid rgba(0,0,0,.2);
    }
    .car::before{ left: 9px; }
    .car::after { right: 9px; }

    .car.left   { background:#dbeafe; }
    .car.right  { background:#d1fae5; }
    .car.siding { background:#ffedd5; }

    .mag{
      position:absolute;
      right: 14px;
      top: calc(var(--ySiding) - 62px);
      width: 120px;
      height: 92px;
      border-radius: 16px;
      background: rgba(255,255,255,.85);
      border: 1px solid #e5e7ef;
      box-shadow: 0 12px 24px rgba(0,0,0,.08);
      display:flex;
      flex-direction: column;
      justify-content:center;
      align-items:center;
      gap: 6px;
      backdrop-filter: blur(6px);
      user-select:none;
    }
    .mag .title{ font-size: 12px; font-weight: 800; color: #374151; }
    .mag .slot{
      min-width: 74px; width: auto; padding: 0 10px; height: 42px;
      border-radius: 14px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }
    .mag .slot::after{
      content:"";
      position:absolute;
      left:10px; right:10px; bottom:8px;
      height:6px;
      border-radius:999px;
      background: rgba(154,163,178,.35);
    }
    .mag .miniCar{ transform: scale(.92); }
    .mag .hint{
      font-size: 11px;
      color: var(--muted);
      padding: 0 8px;
      text-align:center;
      line-height: 1.2;
    }

    #statusMsg{
      position:absolute;
      left: 18px; bottom: 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.8);
      border: 1px solid #e5e7ef;
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
      transition: opacity 300ms;
    }

    .controls{
      margin-top: 14px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
    }
    button{
      border:0;
      padding: 10px 12px;
      border-radius: 12px;
      background:#111827;
      color:white;
      font-weight: 700;
      cursor:pointer;
      transition: opacity 150ms;
    }
    button.secondary{ background:#374151; }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    .hintText{
      margin-left:auto;
      color: var(--muted);
      font-size: 13px;
      max-width: 760px;
    }

    .fly{
      position: fixed;
      left: 0; top: 0;
      min-width: 34px;
      max-width: 68px;
      width: auto;
      padding: 0 8px;
      height: var(--carH);
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      border: 1px solid rgba(17,24,39,.14);
      box-shadow: 0 14px 28px rgba(0,0,0,.18);
      z-index: 9999;
      will-change: transform;
      pointer-events: none;
    }
    .fly::before, .fly::after{
      content:"";
      position:absolute;
      bottom: -6px;
      width: 10px; height: 10px;
      background:#111827;
      opacity:.25;
      border-radius:50%;
      border: 1px solid rgba(0,0,0,.2);
    }
    .fly::before{ left: 9px; }
    .fly::after { right: 9px; }

    #btnUndo{ background:#1e3a5f; }
  </style>
</head>
<body>

<div aria-live="polite" aria-atomic="true" class="sr-only" id="ariaStatus"
     style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>

<div class="wrap">
  <h1>Wagony na torach (v17 — logging + Qualtrics + warunki z URL)</h1>

  <div class="panel">
    <div class="yard" role="region" aria-label="Plac manewrowy z torami i wagonami">

      <div class="ballast main"></div>
      <div class="ballast siding"></div>

      <div class="rail main" id="railMain"></div>
      <div class="ties main"></div>
      <div class="ties siding"></div>

      <svg id="connectorSvg" class="connector" aria-hidden="true">
        <path id="sidingPath"
              fill="none"
              stroke="#9aa3b2"
              stroke-width="10"
              stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>

      <div class="switchTip" id="switchTip" title="Rozjazd" aria-hidden="true"></div>

      <div class="label left"  aria-hidden="true">Lewy tor</div>
      <div class="label right" aria-hidden="true">Prawy tor</div>
      <div class="label siding"aria-hidden="true">Bocznica</div>

      <div class="carsRow carsLeft"   id="carsLeft"   role="list" aria-label="Wagony na lewym torze"></div>
      <div class="carsRow carsRight"  id="carsRight"  role="list" aria-label="Wagony na prawym torze"></div>
      <div class="carsRow carsSiding" id="carsSiding" role="list" aria-label="Wagony na bocznicy"></div>

      <div class="mag" aria-hidden="true">
        <div class="title">Mini-magazyn</div>
        <div class="slot">
          <div class="car siding miniCar" id="magCar">–</div>
        </div>
        <div class="hint">Kopia "pierwszego od prawej"<br/>na bocznicy</div>
      </div>

      <div id="statusMsg" aria-hidden="true">Gotowy</div>
    </div>

    <div class="controls">
      <button id="btnLtoR">Lewy → Prawy</button>
      <button id="btnLtoS">Lewy → Bocznica</button>
      <button id="btnStoL" class="secondary">Bocznica → Lewy</button>
      <button id="btnReset" class="secondary">Reset</button>

      <button id="btnCloneSiding"  class="secondary">Dodaj kopię (→ bocznica)</button>
      <button id="btnRemoveSiding" class="secondary">Usuń (bocznica →)</button>
      <button id="btnUndo">Cofnij (Undo)</button>

      <div class="hintText">
        URL: <code>?participant_id=ABC&condition=A&task_id=task_01&left=abbcdde</code>.
        Parametr <code>left</code> ma pierwszeństwo nad bankiem zadań.
      </div>
    </div>
  </div>
</div>

<script>
  /* ═══════════════════════════════════════════════════════
     Google Sheets logging

     Ten plik wysyła dane metodą GET do Google Apps Script.
     Apps Script musi mieć funkcję doGet(e), która zapisuje parametry do arkusza.
     ═══════════════════════════════════════════════════════ */
  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyfZA0eCSsrID4_ohJKOjmQXsXZtcHk9DXX-OZHDTO3SB9Ir4DbxP1wCvvujlKpcDdyjA/exec";

  /* ═══════════════════════════════════════════════════════
     Animation constants
     ═══════════════════════════════════════════════════════ */
  const ANIM = {
    speed:        1.28,
    minDur:       260,
    maxDur:       860,
    pushDelay:    140,
    releaseDelay: 180,
    gapClose:     140,
    gapRelease:   120,
    fallback:     60,
  };

  /* ═══════════════════════════════════════════════════════
     URL / Qualtrics / task context

     Przykłady:
     ?participant_id=${e://Field/ResponseID}&condition=A&task_id=task_01
     ?participant_id=${e://Field/ResponseID}&condition=A&task_id=task_01&left=abbcdde
     ═══════════════════════════════════════════════════════ */
  const URL_PARAMS = new URLSearchParams(window.location.search);

  const EXPERIMENT = {
    participant_id:
      URL_PARAMS.get("participant_id") ||
      URL_PARAMS.get("ParticipantID") ||
      URL_PARAMS.get("PROLIFIC_PID") ||
      URL_PARAMS.get("ResponseID") ||
      URL_PARAMS.get("response_id") ||
      "anonymous",

    condition:
      URL_PARAMS.get("condition") ||
      URL_PARAMS.get("cond") ||
      "default",

    task_id:
      URL_PARAMS.get("task_id") ||
      URL_PARAMS.get("task") ||
      "default_task",

    session_id: getSessionId()
  };

  /*
    Bank zadań. Możesz go dowolnie zmienić.
    Jeśli w URL jest &left=..., aplikacja użyje left zamiast banku zadań.
  */
  const TASK_BANK = {
    default: {
      default_task: "abcdef"
    },

    A: {
      task_01: "abcdef",
      task_02: "abbcdde",
      task_03: "1223445"
    },

    B: {
      task_01: "aabbccd",
      task_02: "abcddde",
      task_03: "1122334"
    }
  };

  function getSessionId() {
    let id = localStorage.getItem("wagony_session_id");

    if (!id) {
      id = crypto.randomUUID
        ? crypto.randomUUID()
        : "session_" + Date.now() + "_" + Math.random().toString(36).slice(2);

      localStorage.setItem("wagony_session_id", id);
    }

    return id;
  }

  /* ═══════════════════════════════════════════════════════
     State
     Wagons are objects: { id, label }
     ═══════════════════════════════════════════════════════ */
  let left    = [];
  let right   = [];
  let siding  = [];
  let animating = false;
  let wagonCounter = 0;

  const MAX_HISTORY = 30;
  const history = [];

  function makeWagon(label) {
    wagonCounter += 1;

    return {
      id: `w_${String(wagonCounter).padStart(4, "0")}_${label}`,
      label: String(label)
    };
  }

  function cloneWagon(wagon) {
    return {
      id: wagon.id,
      label: wagon.label
    };
  }

  function cloneTrack(track) {
    return track.map(cloneWagon);
  }

  function snapshot() {
    history.push({
      left: cloneTrack(left),
      right: cloneTrack(right),
      siding: cloneTrack(siding)
    });

    if (history.length > MAX_HISTORY) history.shift();
  }

  function serializeTrack(track) {
    return track.map(w => `${w.id}:${w.label}`).join("|");
  }

  function serializeLabels(track) {
    return track.map(w => w.label).join("");
  }

  function serializeState() {
    return {
      left: serializeTrack(left),
      right: serializeTrack(right),
      siding: serializeTrack(siding),
      left_labels: serializeLabels(left),
      right_labels: serializeLabels(right),
      siding_labels: serializeLabels(siding)
    };
  }

  function getInitialLeftString() {
    const explicitLeft = URL_PARAMS.get("left") ?? URL_PARAMS.get("l");

    if (explicitLeft) {
      return explicitLeft;
    }

    const conditionTasks = TASK_BANK[EXPERIMENT.condition] || TASK_BANK.default;
    const taskString = conditionTasks[EXPERIMENT.task_id];

    return taskString || TASK_BANK.default.default_task;
  }

  /* ═══════════════════════════════════════════════════════
     DOM refs
     ═══════════════════════════════════════════════════════ */
  const els = {
    carsLeft:       document.getElementById("carsLeft"),
    carsRight:      document.getElementById("carsRight"),
    carsSiding:     document.getElementById("carsSiding"),
    magCar:         document.getElementById("magCar"),
    btnCloneSiding: document.getElementById("btnCloneSiding"),
    btnRemoveSiding:document.getElementById("btnRemoveSiding"),
    btnUndo:        document.getElementById("btnUndo"),
    switchTip:      document.getElementById("switchTip"),
    railMain:       document.getElementById("railMain"),
    sidingPath:     document.getElementById("sidingPath"),
    statusMsg:      document.getElementById("statusMsg"),
    ariaStatus:     document.getElementById("ariaStatus"),
  };

  /* ═══════════════════════════════════════════════════════
     URL parsing — supports a-z and 0-9
     ═══════════════════════════════════════════════════════ */
  function parseLeftFromUrl() {
    const raw = getInitialLeftString().toLowerCase();

    const dropped = raw.replace(/[a-z0-9]/g, "");
    if (dropped.length > 0) {
      console.warn(`[wagony] URL param zawiera nieobsługiwane znaki: "${dropped}" — zostaną pominięte.`);
    }

    const letters = raw.replace(/[^a-z0-9]/g, "");
    const arr = letters.split("").filter(Boolean);

    return arr.length
      ? arr.map(makeWagon)
      : ["a", "b", "c", "d", "e", "f"].map(makeWagon);
  }

  /* ═══════════════════════════════════════════════════════
     Init & render
     ═══════════════════════════════════════════════════════ */
  function initState() {
    const stateBefore = serializeState();

    wagonCounter = 0;
    left    = parseLeftFromUrl();
    right   = [];
    siding  = [];

    history.length = 0;
    clearTransforms();
    render();
    setStatus("Gotowy");

    logEvent("reset", {
      source_track: "",
      target_track: "left",
      wagon: null,
      state_before: stateBefore,
      state_after: serializeState()
    });
  }

  function render() {
    renderTrack(els.carsLeft,   left,   "left");
    renderTrack(els.carsRight,  right,  "right");
    renderTrack(els.carsSiding, siding, "siding");

    const dis = animating;
    document.getElementById("btnLtoR").disabled   = dis || left.length === 0;
    document.getElementById("btnLtoS").disabled   = dis || left.length === 0;
    document.getElementById("btnStoL").disabled   = dis || siding.length === 0;
    document.getElementById("btnReset").disabled  = dis;
    els.btnCloneSiding.disabled  = dis || siding.length === 0;
    els.btnRemoveSiding.disabled = dis || siding.length === 0;
    els.btnUndo.disabled         = dis || history.length === 0;

    const letter = getRightmostSidingLetter();
    els.magCar.textContent = letter ?? "–";
    els.magCar.style.opacity = letter ? "1" : ".45";
  }

  function renderTrack(containerEl, arr, cls) {
    containerEl.innerHTML = "";

    for (const w of arr) {
      const d = document.createElement("div");
      d.className = `car ${cls}`;
      d.textContent = w.label;
      d.dataset.wagonId = w.id;
      d.dataset.wagonLabel = w.label;
      d.setAttribute("role", "listitem");
      d.setAttribute("aria-label", `Wagon ${w.label}, identyfikator ${w.id}`);
      containerEl.appendChild(d);
    }
  }

  function clearTransforms() {
    els.carsLeft.style.transform   = "translateX(0px)";
    els.carsRight.style.transform  = "translateX(0px)";
    els.carsSiding.style.transform = "translateX(0px)";
  }

  function setStatus(msg) {
    els.statusMsg.textContent  = msg;
    els.ariaStatus.textContent = msg;
  }

  /* ═══════════════════════════════════════════════════════
     State mutation helpers
     ═══════════════════════════════════════════════════════ */
  function removeFromSource(fromName) {
    return fromName === "siding" ? siding.shift() : left.pop();
  }

  function insertIntoDestination(toName, w) {
    if      (toName === "right")  right.unshift(w);
    else if (toName === "siding") siding.unshift(w);
    else if (toName === "left")   left.push(w);
  }

  function getDepartingCarEl(fromName) {
    return fromName === "siding"
      ? els.carsSiding.firstElementChild
      : els.carsLeft.lastElementChild;
  }

  /* ═══════════════════════════════════════════════════════
     Geometry helpers
     ═══════════════════════════════════════════════════════ */
  function measureTargetRect(containerEl, insertAtFront) {
    const ph = document.createElement("div");
    ph.className = "car";
    ph.style.visibility = "hidden";
    ph.textContent = "x";
    insertAtFront
      ? containerEl.insertBefore(ph, containerEl.firstChild)
      : containerEl.appendChild(ph);
    const r = ph.getBoundingClientRect();
    ph.remove();
    return r;
  }

  function getCarSize() {
    const sample =
      els.carsLeft.firstElementChild  ||
      els.carsRight.firstElementChild ||
      els.carsSiding.firstElementChild;
    if (sample) {
      const r = sample.getBoundingClientRect();
      return { w: r.width, h: r.height };
    }
    return { w: 46, h: parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--carH")) };
  }

  function getSwitchPointForCar() {
    const r   = els.switchTip.getBoundingClientRect();
    const cx  = r.left + r.width  / 2;
    const cy  = r.top  + r.height / 2;
    const { w: carW, h: carH } = getCarSize();
    return { x: cx - carW / 2, y: cy - carH / 2 };
  }

  function dist(a, b) {
    return Math.hypot(b.x - a.x, b.y - a.y);
  }

  function transitionTo(el, from, to, durationMs) {
    return new Promise(resolve => {
      let resolved = false;
      function done() {
        if (resolved) return;
        resolved = true;
        resolve();
      }

      el.style.transition = "none";
      el.style.transform  = `translate(${from.x}px, ${from.y}px)`;
      el.getBoundingClientRect();

      el.style.transition = `transform ${Math.round(durationMs)}ms cubic-bezier(.2,.85,.2,1)`;
      el.style.transform  = `translate(${to.x}px, ${to.y}px)`;

      el.addEventListener("transitionend", done, { once: true });
      setTimeout(done, durationMs + ANIM.fallback);
    });
  }

  async function pushExisting(destEl, direction, shouldPush) {
    if (!shouldPush) return;
    const gap  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--gap"));
    const { w: carW } = getCarSize();
    destEl.style.transform = `translateX(${Math.round(carW + gap) * direction}px)`;
    await sleep(ANIM.pushDelay);
  }

  async function releasePush(destEl, wasPushed) {
    if (!wasPushed) return;
    destEl.style.transform = "translateX(0px)";
    await sleep(ANIM.releaseDelay);
  }

  async function closeGapAfterRemove(destEl) {
    destEl.style.transform = "translateX(-10px)";
    await sleep(ANIM.gapClose);
    destEl.style.transform = "translateX(0px)";
    await sleep(ANIM.gapRelease);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function moveAnimated(fromName, toName) {
    if (animating) return;
    if (fromName === "left"   && left.length   === 0) return;
    if (fromName === "siding" && siding.length === 0) return;
    if (fromName === "right") return;

    const toEl =
      toName === "right"  ? els.carsRight  :
      toName === "siding" ? els.carsSiding :
      els.carsLeft;

    animating = true;
    snapshot();
    const stateBefore = serializeState();
    render();

    try {
      const sourceEl = getDepartingCarEl(fromName);
      if (!sourceEl) return;

      const startRect = sourceEl.getBoundingClientRect();
      const insertAtFront = (toName === "right" || toName === "siding");
      const targetRect    = measureTargetRect(toEl, insertAtFront);

      const start  = { x: startRect.left, y: startRect.top };
      const target = { x: targetRect.left, y: targetRect.top };
      const sw     = getSwitchPointForCar();

      sourceEl.style.visibility = "hidden";

      const fly = document.createElement("div");
      fly.className  = `fly ${fromName === "left" ? "left" : "siding"}`;
      fly.textContent = sourceEl.textContent;
      document.body.appendChild(fly);

      setStatus(`Wagon "${fly.textContent}" jedzie: ${fromName} → ${toName}`);

      const d1 = dist(start, sw);
      const t1 = Math.min(ANIM.maxDur, Math.max(ANIM.minDur, d1 / ANIM.speed));
      await transitionTo(fly, start, sw, t1);

      let shouldPush = false;
      let pushDir    = +1;
      if (toName === "right" || toName === "siding") {
        shouldPush = toEl.childElementCount > 0;
        pushDir    = +1;
      } else if (fromName === "siding" && toName === "left") {
        shouldPush = toEl.childElementCount > 0;
        pushDir    = -1;
      }
      await pushExisting(toEl, pushDir, shouldPush);

      const d2 = dist(sw, target);
      const t2 = Math.min(ANIM.maxDur, Math.max(ANIM.minDur, d2 / ANIM.speed));
      await transitionTo(fly, sw, target, t2);

      fly.remove();

      const w = removeFromSource(fromName);
      insertIntoDestination(toName, w);

      setStatus(`Wagon "${w.label}" → ${toName}`);

      logEvent("move", {
        wagon: w,
        source_track: fromName,
        target_track: toName,
        state_before: stateBefore,
        state_after: serializeState()
      });

      render();
      await releasePush(toEl, shouldPush);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  /* ═══════════════════════════════════════════════════════
     Siding helpers
     ═══════════════════════════════════════════════════════ */
  function getRightmostSidingCarEl() { return els.carsSiding.lastElementChild; }

  function getRightmostSidingWagon() {
    return siding.length ? siding[siding.length - 1] : null;
  }

  function getRightmostSidingLetter() {
    return getRightmostSidingWagon()?.label ?? null;
  }

  async function cloneRightmostOnSiding() {
    if (animating || siding.length === 0) return;

    animating = true;
    snapshot();
    const stateBefore = serializeState();
    render();

    try {
      const sourceWagon = getRightmostSidingWagon();
      if (!sourceWagon) return;

      const letter = sourceWagon.label;

      const magRect = els.magCar.getBoundingClientRect();
      const start   = { x: magRect.left, y: magRect.top };

      const shouldPush = els.carsSiding.childElementCount > 0;
      await pushExisting(els.carsSiding, +1, shouldPush);

      const targetRect = measureTargetRect(els.carsSiding, false);
      const target     = { x: targetRect.left, y: targetRect.top };

      const fly = document.createElement("div");
      fly.className  = "fly siding";
      fly.textContent = letter;
      document.body.appendChild(fly);

      setStatus(`Kopiowanie wagonu "${letter}" na bocznicę`);
      await transitionTo(fly, start, target, 520);
      fly.remove();

      const newWagon = makeWagon(letter);
      siding.push(newWagon);

      setStatus(`Kopia wagonu "${letter}" dodana na bocznicę`);

      logEvent("clone", {
        wagon: newWagon,
        source_track: "mini_storage",
        target_track: "siding",
        source_wagon_id: sourceWagon.id,
        source_wagon_label: sourceWagon.label,
        state_before: stateBefore,
        state_after: serializeState()
      });

      render();
      await releasePush(els.carsSiding, shouldPush);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  async function removeRightmostFromSiding() {
    if (animating || siding.length === 0) return;

    animating = true;
    snapshot();
    const stateBefore = serializeState();
    render();

    try {
      const el = getRightmostSidingCarEl();
      if (!el) return;

      const startRect = el.getBoundingClientRect();
      const start     = { x: startRect.left, y: startRect.top };
      const target    = { x: window.innerWidth + 140, y: startRect.top };

      el.style.visibility = "hidden";

      const fly = document.createElement("div");
      fly.className  = "fly siding";
      fly.textContent = el.textContent;
      document.body.appendChild(fly);

      setStatus(`Usuwanie wagonu "${fly.textContent}" z bocznicy`);
      await transitionTo(fly, start, target, 520);
      fly.remove();

      const removed = siding.pop();
      setStatus(`Wagon "${removed.label}" usunięty z bocznicy`);

      logEvent("remove", {
        wagon: removed,
        source_track: "siding",
        target_track: "removed",
        state_before: stateBefore,
        state_after: serializeState()
      });

      render();
      await closeGapAfterRemove(els.carsSiding);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  /* ═══════════════════════════════════════════════════════
     Undo
     ═══════════════════════════════════════════════════════ */
  function undo() {
    if (animating || history.length === 0) return;

    const stateBefore = serializeState();
    const prev = history.pop();

    left   = cloneTrack(prev.left);
    right  = cloneTrack(prev.right);
    siding = cloneTrack(prev.siding);

    clearTransforms();
    render();
    setStatus("Cofnięto ostatnią operację");

    logEvent("undo", {
      source_track: "",
      target_track: "",
      wagon: null,
      state_before: stateBefore,
      state_after: serializeState()
    });
  }

  /* ═══════════════════════════════════════════════════════
     Google Sheets logger

     One event row contains:
     timestamp, session_id, participant_id, task_id, condition,
     event_type, object_id/wagon_id, object_value/wagon_label,
     source_track, target_track, state_before, state_after.
     ═══════════════════════════════════════════════════════ */
  function logEvent(eventType, extra = {}) {
    if (!SHEETS_URL) return;

    const wagon = extra.wagon || null;

    const payload = {
      timestamp: new Date().toISOString(),

      session_id: EXPERIMENT.session_id,
      participant_id: EXPERIMENT.participant_id,
      task_id: EXPERIMENT.task_id,
      condition: EXPERIMENT.condition,

      event_type: eventType,

      object_id: wagon ? wagon.id : "",
      wagon_id: wagon ? wagon.id : "",

      object_value: wagon ? wagon.label : "",
      wagon_label: wagon ? wagon.label : "",

      source_track: extra.source_track || "",
      target_track: extra.target_track || "",

      state_before: extra.state_before
        ? JSON.stringify(extra.state_before)
        : "",

      state_after: extra.state_after
        ? JSON.stringify(extra.state_after)
        : JSON.stringify(serializeState()),

      left_state: serializeTrack(left),
      right_state: serializeTrack(right),
      siding_state: serializeTrack(siding),

      left_labels: serializeLabels(left),
      right_labels: serializeLabels(right),
      siding_labels: serializeLabels(siding),

      source_wagon_id: extra.source_wagon_id || "",
      source_wagon_label: extra.source_wagon_label || "",

      page_url: window.location.href,
      user_agent: navigator.userAgent
    };

    fetch(SHEETS_URL + "?" + new URLSearchParams(payload).toString(), {
      method: "GET",
      mode: "no-cors"
    }).catch(err => console.warn("[wagony] Sheets log failed:", err));
  }

  /* ═══════════════════════════════════════════════════════
     SVG connector
     ═══════════════════════════════════════════════════════ */
  function updateConnector() {
    const yard   = document.querySelector(".yard");
    const yardR  = yard.getBoundingClientRect();

    const sw     = els.switchTip.getBoundingClientRect();
    const swX    = sw.left - yardR.left + sw.width  / 2;

    const endX   = yardR.width - 18;

    const yMain   = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--yMain"));
    const ySiding = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ySiding"));

    const cp1x = swX  - (swX * 0.09);
    const cp1y = yMain + (ySiding - yMain) * 0.45;
    const cp2x = swX  - (swX * 0.065);
    const cp2y = ySiding - 18;

    const d = `M ${swX} ${yMain} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${swX} ${ySiding} L ${endX} ${ySiding}`;

    const svg  = document.getElementById("connectorSvg");
    svg.setAttribute("viewBox", `0 0 ${yardR.width} ${yardR.height}`);
    svg.setAttribute("width",  yardR.width);
    svg.setAttribute("height", yardR.height);

    document.getElementById("sidingPath").setAttribute("d", d);
  }

  /* ═══════════════════════════════════════════════════════
     Button wiring
     ═══════════════════════════════════════════════════════ */
  document.getElementById("btnLtoR").addEventListener("click", () => moveAnimated("left",   "right"));
  document.getElementById("btnLtoS").addEventListener("click", () => moveAnimated("left",   "siding"));
  document.getElementById("btnStoL").addEventListener("click", () => moveAnimated("siding", "left"));
  document.getElementById("btnReset").addEventListener("click", initState);

  els.btnCloneSiding.addEventListener ("click", cloneRightmostOnSiding);
  els.btnRemoveSiding.addEventListener("click", removeRightmostFromSiding);
  els.btnUndo.addEventListener        ("click", undo);

  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "z") {
      e.preventDefault();
      undo();
    }
  });

  /* ═══════════════════════════════════════════════════════
     Boot
     ═══════════════════════════════════════════════════════ */
  initState();

  requestAnimationFrame(updateConnector);
  window.addEventListener("resize", () => requestAnimationFrame(updateConnector));
</script>
</body>
