<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wagony i rozjazd — v16</title>
  <style>
    /* ── Design tokens ───────────────────────────────────── */
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --ink:#111827;
      --muted:#6b7280;

      --track:#9aa3b2;
      --trackHi:#64748b;
      --ballast:#eef2f7;

      --pad:16px;

      --yMain: 140px;
      --ySiding: 325px;
      --switchX: 50%;

      --trackThickness: 10px;

      --carW: auto;   /* expands to fit content — see .car min/max-width */
      --carH: 30px;
      --gap: 10px;

      /* ── Animation constants (tune here) ── */
      --animSpeed: 1.28;   /* px/ms — higher = faster */
      --animMinDur: 260;   /* ms */
      --animMaxDur: 860;   /* ms */
      --pushDelay: 140;    /* ms */
      --releaseDelay: 180; /* ms */
      --gapCloseDelay: 140;
    }

    body{ margin:0; font-family: system-ui, "Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--ink); }
    .wrap{ max-width:100%; margin:0; padding:18px; }
    h1{ font-size:18px; margin:0 0 10px; }

    .panel{
      background:var(--panel);
      border-radius:16px;
      padding:var(--pad);
      box-shadow:0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Yard ───────────────────────────────────────────── */
    .yard{
      position:relative;
      height:420px;
      border-radius:14px;
      background: linear-gradient(180deg, #fbfcff 0%, #f4f7ff 100%);
      overflow:hidden;
      border: 1px solid #e6e9f3;
    }

    .ballast{
      position:absolute;
      height:70px;
      border-radius:18px;
      background: var(--ballast);
      border: 1px solid #e5e7ef;
      opacity:.95;
    }
    .ballast.main{ left:18px; right:18px; top: calc(var(--yMain) - 35px); }
    .ballast.siding{ left: var(--switchX); right: 18px; top: calc(var(--ySiding) - 35px); }

    .rail{
      position:absolute;
      height: var(--trackThickness);
      background: var(--track);
      border-radius:999px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
      transition: filter 180ms ease, background 180ms ease;
    }
    .rail.main{ left: 18px; right: 18px; top: calc(var(--yMain) - var(--trackThickness)/2); }
    .rail.hi{
      background: var(--trackHi);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.14));
    }

    .ties{
      position:absolute;
      height: 36px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 10px,
          rgba(203,213,225,.65) 10px 14px
        );
      opacity:.7;
      pointer-events:none;
      mask-image: linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);
    }
    .ties.main{ left:18px; right:18px; top: calc(var(--yMain) - 18px); }
    .ties.siding{ left: var(--switchX); right: 18px; top: calc(var(--ySiding) - 18px); }

    .connector{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .connector path{
      transition: filter 180ms ease, stroke 180ms ease;
    }
    .connector path.hi{
      stroke: var(--trackHi);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.14));
    }

    .switchTip{
      position:absolute;
      left: calc(var(--switchX) - 11px);
      top: calc(var(--yMain) - 11px);
      width: 22px; height: 22px;
      background:#e5e7eb;
      border:1px solid #cbd5e1;
      border-radius: 8px;
      transform: rotate(10deg);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .switchTip.pulse{
      transform: rotate(10deg) scale(1.08);
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
    }

    .label{
      position:absolute;
      font-size: 12px;
      color: var(--muted);
      font-weight: 650;
      background: rgba(255,255,255,.75);
      border: 1px solid #e5e7ef;
      padding: 6px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    .label.left  { left: 18px;          top: calc(var(--yMain)   - 70px); }
    .label.right { left: var(--switchX); top: calc(var(--yMain)   - 70px); }
    .label.siding{ left: var(--switchX); top: calc(var(--ySiding) - 70px); }

    /* ── Car rows ────────────────────────────────────────── */
    .carsRow{
      position:absolute;
      display:flex;
      align-items:center;
      gap: var(--gap);
      height: 44px;
      padding: 0 6px;
      overflow:hidden;
      transform: translateX(0);
      transition: transform 220ms cubic-bezier(.2,.85,.2,1);
      will-change: transform;
    }
    .carsLeft{
      left: 18px;
      top: calc(var(--yMain) - 22px);
      width: calc(var(--switchX) - 18px);
      justify-content:flex-end;
    }
    .carsRight{
      left: var(--switchX);
      right: 18px;
      top: calc(var(--yMain) - 22px);
      justify-content:flex-start;
    }
    .carsSiding{
      left: var(--switchX);
      right: 18px;
      top: calc(var(--ySiding) - 22px);
      justify-content:flex-start;
    }

    /* ── Car element ─────────────────────────────────────── */
    .car{
      min-width: 34px;
      max-width: 68px;
      width: auto;
      padding: 0 8px;
      height: var(--carH);
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select:none;
      border: 1px solid rgba(17,24,39,.14);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      position: relative;
      flex: 0 0 auto;
    }
    .car::before, .car::after{
      content:"";
      position:absolute;
      bottom: -6px;
      width: 10px; height: 10px;
      background:#111827;
      opacity:.25;
      border-radius:50%;
      border: 1px solid rgba(0,0,0,.2);
    }
    .car::before{ left: 9px; }
    .car::after { right: 9px; }

    .car.left   { background:#dbeafe; }
    .car.right  { background:#d1fae5; }
    .car.siding { background:#ffedd5; }

    /* ── Mini-magazyn ────────────────────────────────────── */
    .mag{
      position:absolute;
      right: 14px;
      top: calc(var(--ySiding) - 62px);
      width: 120px;
      height: 92px;
      border-radius: 16px;
      background: rgba(255,255,255,.85);
      border: 1px solid #e5e7ef;
      box-shadow: 0 12px 24px rgba(0,0,0,.08);
      display:flex;
      flex-direction: column;
      justify-content:center;
      align-items:center;
      gap: 6px;
      backdrop-filter: blur(6px);
      user-select:none;
    }
    .mag .title{ font-size: 12px; font-weight: 800; color: #374151; }
    .mag .slot{
      min-width: 74px; width: auto; padding: 0 10px; height: 42px;
      border-radius: 14px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }
    .mag .slot::after{
      content:"";
      position:absolute;
      left:10px; right:10px; bottom:8px;
      height:6px;
      border-radius:999px;
      background: rgba(154,163,178,.35);
    }
    .mag .miniCar{ transform: scale(.92); }
    .mag .hint{
      font-size: 11px;
      color: var(--muted);
      padding: 0 8px;
      text-align:center;
      line-height: 1.2;
    }

    /* ── Status (aria-live) ──────────────────────────────── */
    #statusMsg{
      position:absolute;
      left: 18px; bottom: 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.8);
      border: 1px solid #e5e7ef;
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
      transition: opacity 300ms;
    }

    /* ── Controls ────────────────────────────────────────── */
    .controls{
      margin-top: 14px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
    }
    button{
      border:0;
      padding: 10px 12px;
      border-radius: 12px;
      background:#111827;
      color:white;
      font-weight: 700;
      cursor:pointer;
      transition: opacity 150ms;
    }
    button.secondary{ background:#374151; }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    .hintText{
      margin-left:auto;
      color: var(--muted);
      font-size: 13px;
      max-width: 760px;
    }

    /* ── Flying car ──────────────────────────────────────── */
    .fly{
      position: fixed;
      left: 0; top: 0;
      min-width: 34px;
      max-width: 68px;
      width: auto;
      padding: 0 8px;
      height: var(--carH);
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      border: 1px solid rgba(17,24,39,.14);
      box-shadow: 0 14px 28px rgba(0,0,0,.18);
      z-index: 9999;
      will-change: transform;
      pointer-events: none;
    }
    .fly::before, .fly::after{
      content:"";
      position:absolute;
      bottom: -6px;
      width: 10px; height: 10px;
      background:#111827;
      opacity:.25;
      border-radius:50%;
      border: 1px solid rgba(0,0,0,.2);
    }
    .fly::before{ left: 9px; }
    .fly::after { right: 9px; }

    /* ── Undo button ─────────────────────────────────────── */
    #btnUndo{ background:#1e3a5f; }
  </style>
</head>
<body>

<!-- Accessible live region for screen readers -->
<div aria-live="polite" aria-atomic="true" class="sr-only" id="ariaStatus"
     style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>

<div class="wrap">
  <h1>Wagony na torach (v16 — start lewego toru z URL: <code>?left=abcdef</code>)</h1>

  <div class="panel">
    <div class="yard" role="region" aria-label="Plac manewrowy z torami i wagonami">

      <div class="ballast main"></div>
      <div class="ballast siding"></div>

      <div class="rail main" id="railMain"></div>
      <div class="ties main"></div>
      <div class="ties siding"></div>

      <svg class="connector" viewBox="0 0 1000 420" preserveAspectRatio="none" aria-hidden="true">
        <path id="sidingPath"
              d="M 500 140 C 455 170, 435 235, 500 325 L 980 325"
              fill="none"
              stroke="#9aa3b2"
              stroke-width="10"
              stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>

      <div class="switchTip" id="switchTip" title="Rozjazd" aria-hidden="true"></div>

      <div class="label left"  aria-hidden="true">Lewy tor</div>
      <div class="label right" aria-hidden="true">Prawy tor</div>
      <div class="label siding"aria-hidden="true">Bocznica</div>

      <div class="carsRow carsLeft"   id="carsLeft"   role="list" aria-label="Wagony na lewym torze"></div>
      <div class="carsRow carsRight"  id="carsRight"  role="list" aria-label="Wagony na prawym torze"></div>
      <div class="carsRow carsSiding" id="carsSiding" role="list" aria-label="Wagony na bocznicy"></div>

      <div class="mag" aria-hidden="true">
        <div class="title">Mini-magazyn</div>
        <div class="slot">
          <div class="car siding miniCar" id="magCar">–</div>
        </div>
        <div class="hint">Kopia "pierwszego od prawej"<br/>na bocznicy</div>
      </div>

      <div id="statusMsg" aria-hidden="true">Gotowy</div>
    </div>

    <div class="controls">
      <button id="btnLtoR">Lewy → Prawy</button>
      <button id="btnLtoS">Lewy → Bocznica</button>
      <button id="btnStoL" class="secondary">Bocznica → Lewy</button>
      <button id="btnReset" class="secondary">Reset</button>

      <button id="btnCloneSiding"  class="secondary">Dodaj kopię (→ bocznica)</button>
      <button id="btnRemoveSiding" class="secondary">Usuń (bocznica →)</button>
      <button id="btnUndo">Cofnij (Undo)</button>

      <div class="hintText">
        Start lewego toru ustawisz w URL: <code>?left=abcdef</code> (lub <code>?l=abcdef</code>).
        Obsługiwane znaki: litery a–z i cyfry 0–9.
      </div>
    </div>
  </div>
</div>

<script>
  /* ═══════════════════════════════════════════════════════
     Google Sheets logging — paste your Apps Script URL here.
     Leave as "" to disable. See google-logger.gs for setup.
     ═══════════════════════════════════════════════════════ */
  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxwx9ZSO-qIF2eEC-2M4Ay7y42nM-3dRNd6tM6gEO9yAY40TvmXIpzVLq-wbQ8cb6WYdA/exec";

  /* ═══════════════════════════════════════════════════════
     Animation constants — tune all timings in one place
     ═══════════════════════════════════════════════════════ */
  const ANIM = {
    speed:        1.28,   // px per ms — higher = faster cars
    minDur:       260,    // ms minimum per leg
    maxDur:       860,    // ms maximum per leg
    pushDelay:    140,    // ms to wait after pushing existing cars
    releaseDelay: 180,    // ms to wait after releasing push
    gapClose:     140,    // ms for gap-close nudge
    gapRelease:   120,    // ms after gap-close
    fallback:     60,     // extra ms added to duration for transitionend fallback
  };

  /* ═══════════════════════════════════════════════════════
     State
     ═══════════════════════════════════════════════════════ */
  let left    = [];
  let right   = [];
  let siding  = [];
  let animating = false;

  // History stack for undo — each entry is a snapshot
  const MAX_HISTORY = 30;
  const history = [];

  function snapshot() {
    history.push({ left: [...left], right: [...right], siding: [...siding] });
    if (history.length > MAX_HISTORY) history.shift();
  }

  /* ═══════════════════════════════════════════════════════
     DOM refs
     ═══════════════════════════════════════════════════════ */
  const els = {
    carsLeft:       document.getElementById("carsLeft"),
    carsRight:      document.getElementById("carsRight"),
    carsSiding:     document.getElementById("carsSiding"),
    magCar:         document.getElementById("magCar"),
    btnCloneSiding: document.getElementById("btnCloneSiding"),
    btnRemoveSiding:document.getElementById("btnRemoveSiding"),
    btnUndo:        document.getElementById("btnUndo"),
    switchTip:      document.getElementById("switchTip"),
    railMain:       document.getElementById("railMain"),
    sidingPath:     document.getElementById("sidingPath"),
    statusMsg:      document.getElementById("statusMsg"),
    ariaStatus:     document.getElementById("ariaStatus"),
  };

  /* ═══════════════════════════════════════════════════════
     URL parsing — supports a–z and 0–9, warns on unknown chars
     ═══════════════════════════════════════════════════════ */
  function parseLeftFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw    = (params.get("left") ?? params.get("l") ?? "").toLowerCase();

    // Warn about characters we're dropping
    const dropped = raw.replace(/[a-z0-9]/g, "");
    if (dropped.length > 0) {
      console.warn(`[wagony] URL param zawiera nieobsługiwane znaki: "${dropped}" — zostaną pominięte.`);
    }

    const letters = raw.replace(/[^a-z0-9]/g, "");
    const arr = letters.split("").filter(Boolean);
    return arr.length ? arr : ["a","b","c","d","e","f"];
  }

  /* ═══════════════════════════════════════════════════════
     Init & render
     ═══════════════════════════════════════════════════════ */
  function initState() {
    left    = parseLeftFromUrl();
    right   = [];
    siding  = [];
    history.length = 0;
    clearTransforms();
    render();
    setStatus("Gotowy");
    logEvent("reset");
  }

  function render() {
    renderTrack(els.carsLeft,   left,   "left");
    renderTrack(els.carsRight,  right,  "right");
    renderTrack(els.carsSiding, siding, "siding");

    const dis = animating;
    document.getElementById("btnLtoR").disabled   = dis || left.length === 0;
    document.getElementById("btnLtoS").disabled   = dis || left.length === 0;
    document.getElementById("btnStoL").disabled   = dis || siding.length === 0;
    document.getElementById("btnReset").disabled  = dis;
    els.btnCloneSiding.disabled  = dis || siding.length === 0;
    els.btnRemoveSiding.disabled = dis || siding.length === 0;
    els.btnUndo.disabled         = dis || history.length === 0;

    const letter = getRightmostSidingLetter();
    els.magCar.textContent = letter ?? "–";
    els.magCar.style.opacity = letter ? "1" : ".45";
  }

  function renderTrack(containerEl, arr, cls) {
    containerEl.innerHTML = "";
    for (const w of arr) {
      const d = document.createElement("div");
      d.className = `car ${cls}`;
      d.textContent = w;
      d.setAttribute("role", "listitem");
      d.setAttribute("aria-label", `Wagon ${w}`);
      containerEl.appendChild(d);
    }
  }

  function clearTransforms() {
    els.carsLeft.style.transform   = "translateX(0px)";
    els.carsRight.style.transform  = "translateX(0px)";
    els.carsSiding.style.transform = "translateX(0px)";
  }

  /* ═══════════════════════════════════════════════════════
     Status helpers
     ═══════════════════════════════════════════════════════ */
  function setStatus(msg) {
    els.statusMsg.textContent  = msg;
    els.ariaStatus.textContent = msg;   // screen-reader announcement
  }

  /* ═══════════════════════════════════════════════════════
     State mutation helpers
     ═══════════════════════════════════════════════════════ */
  function removeFromSource(fromName) {
    return fromName === "siding" ? siding.shift() : left.pop();
  }

  function insertIntoDestination(toName, w) {
    if      (toName === "right")  right.unshift(w);
    else if (toName === "siding") siding.unshift(w);
    else if (toName === "left")   left.push(w);
  }

  function getDepartingCarEl(fromName) {
    return fromName === "siding"
      ? els.carsSiding.firstElementChild
      : els.carsLeft.lastElementChild;
  }

  /* ═══════════════════════════════════════════════════════
     Geometry helpers
     ═══════════════════════════════════════════════════════ */
  function measureTargetRect(containerEl, insertAtFront) {
    const ph = document.createElement("div");
    ph.className = "car";
    ph.style.visibility = "hidden";
    ph.textContent = "x";
    insertAtFront
      ? containerEl.insertBefore(ph, containerEl.firstChild)
      : containerEl.appendChild(ph);
    const r = ph.getBoundingClientRect();
    ph.remove();
    return r;
  }

  function getCarSize() {
    // Measure an actual rendered car — works with auto-width cars
    const sample =
      els.carsLeft.firstElementChild  ||
      els.carsRight.firstElementChild ||
      els.carsSiding.firstElementChild;
    if (sample) {
      const r = sample.getBoundingClientRect();
      return { w: r.width, h: r.height };
    }
    // Fallback if no cars are rendered yet
    return { w: 46, h: parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--carH")) };
  }

  function getSwitchPointForCar() {
    const r   = els.switchTip.getBoundingClientRect();
    const cx  = r.left + r.width  / 2;
    const cy  = r.top  + r.height / 2;
    const { w: carW, h: carH } = getCarSize();
    return { x: cx - carW / 2, y: cy - carH / 2 };
  }

  function dist(a, b) {
    return Math.hypot(b.x - a.x, b.y - a.y);
  }

  /* ═══════════════════════════════════════════════════════
     FIX 1 — transitionTo with fallback timeout
     Prevents the Promise from hanging when from === to
     (browser skips the transition and transitionend never fires)
     ═══════════════════════════════════════════════════════ */
  function transitionTo(el, from, to, durationMs) {
    return new Promise(resolve => {
      let resolved = false;
      function done() {
        if (resolved) return;
        resolved = true;
        resolve();
      }

      el.style.transition = "none";
      el.style.transform  = `translate(${from.x}px, ${from.y}px)`;
      el.getBoundingClientRect(); // force reflow

      el.style.transition = `transform ${Math.round(durationMs)}ms cubic-bezier(.2,.85,.2,1)`;
      el.style.transform  = `translate(${to.x}px, ${to.y}px)`;

      el.addEventListener("transitionend", done, { once: true });

      // Fallback: resolve after duration + buffer even if transitionend never fires
      setTimeout(done, durationMs + ANIM.fallback);
    });
  }

  /* ═══════════════════════════════════════════════════════
     Push / release helpers
     ═══════════════════════════════════════════════════════ */
  async function pushExisting(destEl, direction, shouldPush) {
    if (!shouldPush) return;
    const gap  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--gap"));
    const { w: carW } = getCarSize();
    destEl.style.transform = `translateX(${Math.round(carW + gap) * direction}px)`;
    await sleep(ANIM.pushDelay);
  }

  async function releasePush(destEl, wasPushed) {
    if (!wasPushed) return;
    destEl.style.transform = "translateX(0px)";
    await sleep(ANIM.releaseDelay);
  }

  async function closeGapAfterRemove(destEl) {
    destEl.style.transform = "translateX(-10px)";
    await sleep(ANIM.gapClose);
    destEl.style.transform = "translateX(0px)";
    await sleep(ANIM.gapRelease);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ═══════════════════════════════════════════════════════
     FIX 2 — animating flag always reset via try/finally
     ═══════════════════════════════════════════════════════ */
  async function moveAnimated(fromName, toName) {
    if (animating) return;
    if (fromName === "left"   && left.length   === 0) return;
    if (fromName === "siding" && siding.length === 0) return;
    if (fromName === "right") return;

    const toEl =
      toName === "right"  ? els.carsRight  :
      toName === "siding" ? els.carsSiding :
      els.carsLeft;

    animating = true;
    snapshot();
    render();

    try {
      const sourceEl = getDepartingCarEl(fromName);
      if (!sourceEl) return;

      const startRect = sourceEl.getBoundingClientRect();

      const insertAtFront = (toName === "right" || toName === "siding");
      const targetRect    = measureTargetRect(toEl, insertAtFront);

      const start  = { x: startRect.left, y: startRect.top };
      const target = { x: targetRect.left, y: targetRect.top };
      const sw     = getSwitchPointForCar();

      sourceEl.style.visibility = "hidden";

      // Create flying car
      const fly = document.createElement("div");
      fly.className  = `fly ${fromName === "left" ? "left" : "siding"}`;
      fly.textContent = sourceEl.textContent;
      document.body.appendChild(fly);

      setStatus(`Wagon "${fly.textContent}" jedzie: ${fromName} → ${toName}`);

      // Leg 1: source → switch
      const d1 = dist(start, sw);
      const t1 = Math.min(ANIM.maxDur, Math.max(ANIM.minDur, d1 / ANIM.speed));
      await transitionTo(fly, start, sw, t1);

      // Push existing cars in destination
      let shouldPush = false;
      let pushDir    = +1;
      if (toName === "right" || toName === "siding") {
        shouldPush = toEl.childElementCount > 0;
        pushDir    = +1;
      } else if (fromName === "siding" && toName === "left") {
        shouldPush = toEl.childElementCount > 0;
        pushDir    = -1;
      }
      await pushExisting(toEl, pushDir, shouldPush);

      // Leg 2: switch → destination slot
      const d2 = dist(sw, target);
      const t2 = Math.min(ANIM.maxDur, Math.max(ANIM.minDur, d2 / ANIM.speed));
      await transitionTo(fly, sw, target, t2);

      fly.remove();

      // Commit state
      const w = removeFromSource(fromName);
      insertIntoDestination(toName, w);

      setStatus(`Wagon "${w}" → ${toName}`);
      logEvent("move", { from: fromName, to: toName, wagon: w });

      render();
      await releasePush(toEl, shouldPush);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  /* ═══════════════════════════════════════════════════════
     Siding helpers
     ═══════════════════════════════════════════════════════ */
  function getRightmostSidingCarEl()    { return els.carsSiding.lastElementChild; }
  function getRightmostSidingLetter()   { return getRightmostSidingCarEl()?.textContent ?? null; }

  async function cloneRightmostOnSiding() {
    if (animating || siding.length === 0) return;

    animating = true;
    snapshot();
    render();

    try {
      const letter = getRightmostSidingLetter();
      if (!letter) return;

      const magRect = els.magCar.getBoundingClientRect();
      const start   = { x: magRect.left, y: magRect.top };

      const shouldPush = els.carsSiding.childElementCount > 0;
      await pushExisting(els.carsSiding, +1, shouldPush);

      // Measure placeholder at the end of siding
      const targetRect = measureTargetRect(els.carsSiding, false);
      const target     = { x: targetRect.left, y: targetRect.top };

      const fly = document.createElement("div");
      fly.className  = "fly siding";
      fly.textContent = letter;
      document.body.appendChild(fly);

      setStatus(`Kopiowanie wagonu "${letter}" na bocznicę`);
      await transitionTo(fly, start, target, 520);
      fly.remove();

      siding.push(letter);
      setStatus(`Kopia wagonu "${letter}" dodana na bocznicę`);
      logEvent("clone", { wagon: letter });
      render();
      await releasePush(els.carsSiding, shouldPush);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  async function removeRightmostFromSiding() {
    if (animating || siding.length === 0) return;

    animating = true;
    snapshot();
    render();

    try {
      const el = getRightmostSidingCarEl();
      if (!el) return;

      const startRect = el.getBoundingClientRect();
      const start     = { x: startRect.left, y: startRect.top };
      const target    = { x: window.innerWidth + 140, y: startRect.top };

      el.style.visibility = "hidden";

      const fly = document.createElement("div");
      fly.className  = "fly siding";
      fly.textContent = el.textContent;
      document.body.appendChild(fly);

      setStatus(`Usuwanie wagonu "${fly.textContent}" z bocznicy`);
      await transitionTo(fly, start, target, 520);
      fly.remove();

      const removed = siding.pop();
      setStatus(`Wagon "${removed}" usunięty z bocznicy`);
      logEvent("remove", { wagon: removed });
      render();
      await closeGapAfterRemove(els.carsSiding);
      render();

    } finally {
      animating = false;
      render();
    }
  }

  /* ═══════════════════════════════════════════════════════
     Undo
     ═══════════════════════════════════════════════════════ */
  function undo() {
    if (animating || history.length === 0) return;
    const prev = history.pop();
    left   = prev.left;
    right  = prev.right;
    siding = prev.siding;
    clearTransforms();
    render();
    setStatus("Cofnięto ostatnią operację");
    logEvent("undo");
  }

  /* ═══════════════════════════════════════════════════════
     Google Sheets logger
     Sends one row per action: timestamp, action, from, to,
     wagon label, and full state snapshot.
     Uses no-cors fetch so GitHub Pages works without CORS headers.
     ═══════════════════════════════════════════════════════ */
  function logEvent(action, extra = {}) {
    if (!SHEETS_URL) return;   // logging disabled

    const payload = {
      timestamp: new Date().toISOString(),
      action,
      left:   left.join(","),
      right:  right.join(","),
      siding: siding.join(","),
      ...extra,                // e.g. { from: "left", to: "right", wagon: "a" }
    };

    // We use no-cors so the browser never blocks the request from GitHub Pages.
    // The Apps Script response is opaque but the data always arrives.
    fetch(SHEETS_URL + "?" + new URLSearchParams(payload).toString(), {
      method: "GET",
      mode:   "no-cors",
    }).catch(err => console.warn("[wagony] Sheets log failed:", err));
  }

  /* ═══════════════════════════════════════════════════════
     Button wiring
     ═══════════════════════════════════════════════════════ */
  document.getElementById("btnLtoR").addEventListener("click", () => moveAnimated("left",   "right"));
  document.getElementById("btnLtoS").addEventListener("click", () => moveAnimated("left",   "siding"));
  document.getElementById("btnStoL").addEventListener("click", () => moveAnimated("siding", "left"));
  document.getElementById("btnReset").addEventListener("click", initState);

  els.btnCloneSiding.addEventListener ("click", cloneRightmostOnSiding);
  els.btnRemoveSiding.addEventListener("click", removeRightmostFromSiding);
  els.btnUndo.addEventListener        ("click", undo);

  // Keyboard shortcut: Ctrl+Z / Cmd+Z
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "z") {
      e.preventDefault();
      undo();
    }
  });

  /* ═══════════════════════════════════════════════════════
     Boot
     ═══════════════════════════════════════════════════════ */
  initState();
</script>
</body>
</html>
